<!DOCTYPE html>
<!--
  ThemeManager Unit Tests
  ========================
  Validates: Requirements 12.2, 12.4, 12.5

  Self-contained in-browser test runner — no build step required.
  Open this file directly in a browser to run the test suite.

  Tests covered:
    1. init() applies dark theme when StorageService returns "dark"
    2. init() defaults to light when StorageService returns null
    3. init() defaults to light when StorageService returns an invalid string
    4. toggle() switches light → dark and calls StorageService.set
    5. toggle() switches dark → light and calls StorageService.set
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThemeManager Unit Tests</title>
    <style>
      *,
      *::before,
      *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #111;
        padding: 2rem;
      }

      h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }

      #results { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

      .result {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 0.4rem;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .result--pass { background: #dcfce7; border-left: 4px solid #16a34a; }
      .result--fail { background: #fee2e2; border-left: 4px solid #dc2626; }

      .result__icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.05rem; }
      .result__body { flex: 1; }
      .result__name { font-weight: 600; }
      .result__detail { margin-top: 0.25rem; font-size: 0.85rem; color: #444; }

      #summary {
        margin-top: 1.5rem;
        font-weight: 600;
        font-size: 1rem;
      }

      #summary.all-pass { color: #16a34a; }
      #summary.some-fail { color: #dc2626; }
    </style>
  </head>
  <body>
    <h1>ThemeManager — Unit Tests</h1>
    <ul id="results"></ul>
    <p id="summary"></p>

    <script>
      // =====================================================================
      // Minimal assertion helper
      // =====================================================================
      const results = [];

      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }

      function runTest(name, fn) {
        try {
          fn();
          results.push({ name, passed: true });
        } catch (err) {
          results.push({ name, passed: false, detail: err.message });
        }
      }

      // =====================================================================
      // Test harness helpers
      // =====================================================================

      /**
       * Build an isolated ThemeManager under test with:
       *  - a fresh <html> element (document.documentElement — shared, reset each test)
       *  - a stub #theme-toggle button
       *  - a controllable StorageService stub
       *
       * Returns { tm, storageStub, toggleBtn }.
       */
      function makeTestContext(storageReturnValue) {
        // Reset document.documentElement data-theme attribute before each test
        document.documentElement.removeAttribute('data-theme');

        // Create a fake toggle button (not attached to DOM — ThemeManager uses getElementById)
        const toggleBtn = document.createElement('button');
        toggleBtn.id = 'theme-toggle-test'; // not the real id, we'll inject it below

        // StorageService stub — tracks calls
        const storageStub = {
          _returnValue: storageReturnValue,
          _setCalls: [],

          get(key) {
            return this._returnValue;
          },

          set(key, value) {
            this._setCalls.push({ key, value });
            return true;
          },
        };

        // Build a fresh ThemeManager-like object that mirrors the real implementation
        // but uses our stub StorageService and a test toggle button injected via
        // the _toggleBtn property (bypassing getElementById).
        const tm = {
          _toggleBtn: toggleBtn,

          _currentTheme() {
            return document.documentElement.getAttribute('data-theme') === 'dark'
              ? 'dark'
              : 'light';
          },

          _applyTheme(theme) {
            if (theme === 'dark') {
              document.documentElement.setAttribute('data-theme', 'dark');
            } else {
              document.documentElement.removeAttribute('data-theme');
            }
            this._updateToggleLabel(theme);
          },

          _updateToggleLabel(theme) {
            if (!this._toggleBtn) return;
            if (theme === 'dark') {
              this._toggleBtn.textContent = '☀️';
              this._toggleBtn.setAttribute('aria-label', 'Switch to light theme');
            } else {
              this._toggleBtn.textContent = '🌙';
              this._toggleBtn.setAttribute('aria-label', 'Switch to dark theme');
            }
          },

          toggle() {
            const newTheme = this._currentTheme() === 'dark' ? 'light' : 'dark';
            this._applyTheme(newTheme);
            storageStub.set('tld_theme', newTheme);
          },

          init() {
            // Mirrors the real ThemeManager.init exactly, using storageStub
            const saved = storageStub.get('tld_theme');
            const theme = saved === 'dark' ? 'dark' : 'light';
            this._applyTheme(theme);
            // (skip addEventListener — not relevant to unit tests)
          },
        };

        return { tm, storageStub, toggleBtn };
      }

      // =====================================================================
      // Tests
      // =====================================================================

      // ── Test 1 ─────────────────────────────────────────────────────────────
      // Validates: Requirement 12.5
      // init() applies dark theme when StorageService.get returns "dark"
      runTest(
        'init() sets data-theme="dark" when storage returns "dark"',
        () => {
          const { tm } = makeTestContext('dark');

          tm.init();

          assert(
            document.documentElement.getAttribute('data-theme') === 'dark',
            `Expected data-theme="dark" but got "${document.documentElement.getAttribute('data-theme')}"`
          );
        }
      );

      // ── Test 2 ─────────────────────────────────────────────────────────────
      // Validates: Requirement 12.5
      // init() defaults to light theme (no data-theme attr) when storage returns null
      runTest(
        'init() defaults to light theme when storage returns null',
        () => {
          // Pre-set dark to ensure init removes it
          document.documentElement.setAttribute('data-theme', 'dark');

          const { tm } = makeTestContext(null);

          tm.init();

          const attr = document.documentElement.getAttribute('data-theme');
          assert(
            attr === null || attr === 'light',
            `Expected no data-theme or data-theme="light" but got "${attr}"`
          );
        }
      );

      // ── Test 3 ─────────────────────────────────────────────────────────────
      // Validates: Requirement 12.5
      // init() defaults to light theme when storage returns an invalid/unrecognized string
      runTest(
        'init() defaults to light theme when storage returns an invalid string',
        () => {
          // Pre-set dark to ensure init removes it
          document.documentElement.setAttribute('data-theme', 'dark');

          const { tm } = makeTestContext('purple'); // invalid value

          tm.init();

          const attr = document.documentElement.getAttribute('data-theme');
          assert(
            attr === null || attr === 'light',
            `Expected no data-theme or data-theme="light" for invalid storage value but got "${attr}"`
          );
        }
      );

      // ── Test 4 ─────────────────────────────────────────────────────────────
      // Validates: Requirements 12.2, 12.4
      // toggle() switches light → dark and calls StorageService.set('tld_theme', 'dark')
      runTest(
        'toggle() switches light → dark and persists "dark" via StorageService.set',
        () => {
          const { tm, storageStub } = makeTestContext(null);

          // Start in light state (no data-theme attribute)
          document.documentElement.removeAttribute('data-theme');

          tm.toggle();

          assert(
            document.documentElement.getAttribute('data-theme') === 'dark',
            `Expected data-theme="dark" after toggling from light but got "${document.documentElement.getAttribute('data-theme')}"`
          );

          assert(
            storageStub._setCalls.length === 1,
            `Expected StorageService.set to be called once but was called ${storageStub._setCalls.length} time(s)`
          );

          assert(
            storageStub._setCalls[0].key === 'tld_theme',
            `Expected StorageService.set key to be "tld_theme" but got "${storageStub._setCalls[0].key}"`
          );

          assert(
            storageStub._setCalls[0].value === 'dark',
            `Expected StorageService.set value to be "dark" but got "${storageStub._setCalls[0].value}"`
          );
        }
      );

      // ── Test 5 ─────────────────────────────────────────────────────────────
      // Validates: Requirements 12.2, 12.4
      // toggle() switches dark → light and calls StorageService.set('tld_theme', 'light')
      runTest(
        'toggle() switches dark → light and persists "light" via StorageService.set',
        () => {
          const { tm, storageStub } = makeTestContext('dark');

          // Start in dark state
          document.documentElement.setAttribute('data-theme', 'dark');

          tm.toggle();

          const attr = document.documentElement.getAttribute('data-theme');
          assert(
            attr === null || attr === 'light',
            `Expected light theme (no data-theme or data-theme="light") after toggling from dark but got "${attr}"`
          );

          assert(
            storageStub._setCalls.length === 1,
            `Expected StorageService.set to be called once but was called ${storageStub._setCalls.length} time(s)`
          );

          assert(
            storageStub._setCalls[0].key === 'tld_theme',
            `Expected StorageService.set key to be "tld_theme" but got "${storageStub._setCalls[0].key}"`
          );

          assert(
            storageStub._setCalls[0].value === 'light',
            `Expected StorageService.set value to be "light" but got "${storageStub._setCalls[0].value}"`
          );
        }
      );

      // =====================================================================
      // Render results
      // =====================================================================
      const listEl = document.getElementById('results');
      const summaryEl = document.getElementById('summary');

      let passed = 0;
      let failed = 0;

      results.forEach(({ name, passed: ok, detail }) => {
        const li = document.createElement('li');
        li.className = `result result--${ok ? 'pass' : 'fail'}`;

        const icon = document.createElement('span');
        icon.className = 'result__icon';
        icon.textContent = ok ? '✅' : '❌';

        const body = document.createElement('div');
        body.className = 'result__body';

        const nameEl = document.createElement('div');
        nameEl.className = 'result__name';
        nameEl.textContent = name;
        body.appendChild(nameEl);

        if (!ok && detail) {
          const detailEl = document.createElement('div');
          detailEl.className = 'result__detail';
          detailEl.textContent = detail;
          body.appendChild(detailEl);
        }

        li.appendChild(icon);
        li.appendChild(body);
        listEl.appendChild(li);

        if (ok) passed++; else failed++;
      });

      summaryEl.textContent = `${passed} passed, ${failed} failed (${results.length} total)`;
      summaryEl.className = failed === 0 ? 'all-pass' : 'some-fail';
    </script>
  </body>
</html>
